<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
        }

            background: linear-gradient(135deg, #012D1D 0%, #1B4332 100%);

<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex items-center justify-center p-4">
<!-- Design Shell (Hidden for Transactional Screen as per Rule) -->
<main class="w-full max-w-md">
<!-- Brand Header -->
<div class="text-center mb-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-primary-container mb-6 shadow-sm">
<span class="material-symbols-outlined text-on-primary-container text-3xl" style="font-variation-settings: 'FILL' 1;">shield_person</span>
</div>
<h1 class="font-headline font-extrabold text-3xl text-primary tracking-tight mb-2">Verifique seu e-mail</h1>
<p class="text-on-surface-variant text-sm leading-relaxed max-w-[280px] mx-auto">
                Enviamos um código de segurança para <span class="font-semibold text-primary">adriano.silveira@exemplo.com.br</span>
</p>
</div>
<!-- Verification Container -->
<div class="bg-surface-container-lowest rounded-3xl p-8 shadow-[0_8px_24px_-2px_rgba(25,28,29,0.06)] relative overflow-hidden">
<!-- Decorative Accent -->
<div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-primary to-secondary-container opacity-20"></div>
<form class="space-y-8">
<!-- Code Input Group -->
<div>
<label class="block font-label text-[11px] uppercase tracking-widest font-bold text-on-surface-variant mb-4 text-center">Digite o código de 6 dígitos</label>
<div class="flex justify-between gap-2 sm:gap-3">
<input class="w-12 h-14 text-center font-headline text-xl font-bold bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-fixed-dim focus:bg-surface-container-lowest transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 text-center font-headline text-xl font-bold bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-fixed-dim focus:bg-surface-container-lowest transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 text-center font-headline text-xl font-bold bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-fixed-dim focus:bg-surface-container-lowest transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 text-center font-headline text-xl font-bold bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-fixed-dim focus:bg-surface-container-lowest transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 text-center font-headline text-xl font-bold bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-fixed-dim focus:bg-surface-container-lowest transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="w-12 h-14 text-center font-headline text-xl font-bold bg-surface-container-low border-0 rounded-xl focus:ring-2 focus:ring-primary-fixed-dim focus:bg-surface-container-lowest transition-all" maxlength="1" placeholder="•" type="text"/>
</div>
</div>
<!-- Primary Action -->
<button class="w-full editorial-gradient text-on-primary font-headline font-bold py-4 rounded-xl shadow-lg shadow-primary-container/20 hover:opacity-90 transition-opacity flex items-center justify-center gap-2" type="submit">
                    Verificar e Acessar
                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
<!-- Footer Actions -->
<div class="flex flex-col items-center gap-4 pt-2">
<button class="group flex items-center gap-2 text-sm font-semibold text-secondary hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-lg">refresh</span>
                        Reenviar código
                    </button>
<a class="text-[11px] font-label font-medium text-on-surface-variant flex items-center gap-1 hover:text-primary transition-colors" href="#">
<span class="material-symbols-outlined text-xs">help</span>
                        Precisa de ajuda com o acesso?
                    </a>
</div>
</form>
</div>
<!-- Security Badge -->
<div class="mt-8 flex items-center justify-center gap-3 opacity-60">
<div class="h-[1px] w-8 bg-outline-variant"></div>
<div class="flex items-center gap-1.5">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">encrypted</span>
<span class="text-[10px] uppercase tracking-widest font-bold font-label">Conexão Criptografada</span>
</div>
<div class="h-[1px] w-8 bg-outline-variant"></div>
</div>
</main>
<!-- Aesthetic Background Elements -->
<div class="fixed top-[-10%] right-[-5%] w-[400px] h-[400px] bg-primary-fixed/20 blur-[120px] -z-10 rounded-full"></div>
<div class="fixed bottom-[-10%] left-[-5%] w-[300px] h-[300px] bg-secondary-container/30 blur-[100px] -z-10 rounded-full"></div>
