<!DOCTYPE html>
<html class="light" lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SIGPREV | Criar Conta</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            "primary": "#012d1d",
            "surface": "#f8f9fa",
            "on-surface": "#191c1d",
            "on-surface-variant": "#414844",
            "outline-variant": "#c1c8c2",
            "secondary": "#2c694e",
          },
          fontFamily: {
            headline: ["Manrope", "sans-serif"],
            body: ["Inter", "sans-serif"],
          }
        }
      }
    }
  </script>
  <style>
    .editorial-gradient {
      background: linear-gradient(135deg, #012D1D 0%, #1B4332 100%);
    }
  </style>
</head>
<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col">
  <header class="p-6">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div class="text-2xl font-extrabold text-primary tracking-tighter cursor-pointer" data-route="landing">SIGPREV</div>
      <a href="#" data-route="login" class="text-sm font-bold text-primary hover:underline">Já tenho conta</a>
    </div>
  </header>

  <main class="flex-1 flex items-center justify-center px-6 py-12">
    <div class="w-full max-w-md space-y-8">
      <div class="text-center">
        <h1 class="font-headline text-3xl font-extrabold text-primary tracking-tight">Comece sua jornada</h1>
        <p class="mt-2 text-on-surface-variant">Crie sua conta para assumir o controle editorial das suas finanças.</p>
      </div>

      <form action="#" class="space-y-4" id="registrationForm" data-submit-route="dashboard">
        <div>
          <label for="name" class="block text-xs font-bold text-primary mb-1 uppercase tracking-widest">Nome completo</label>
          <input type="text" id="name" required class="w-full rounded-xl border-outline-variant focus:border-primary focus:ring-primary p-3 bg-white" placeholder="Seu nome">
        </div>
        
        <div>
          <label for="email" class="block text-xs font-bold text-primary mb-1 uppercase tracking-widest">E-mail profissional</label>
          <input type="email" id="email" required class="w-full rounded-xl border-outline-variant focus:border-primary focus:ring-primary p-3 bg-white" placeholder="email@exemplo.com">
        </div>

        <div>
          <label for="password" class="block text-xs font-bold text-primary mb-1 uppercase tracking-widest">Senha</label>
          <input type="password" id="password" required class="w-full rounded-xl border-outline-variant focus:border-primary focus:ring-primary p-3 bg-white" placeholder="••••••••">
        </div>

        <div class="flex items-start gap-3 pt-2">
          <input type="checkbox" id="terms" required class="mt-1 rounded text-primary focus:ring-primary">
          <label for="terms" class="text-xs text-on-surface-variant leading-tight">
            Concordo com os <a href="#" class="font-bold underline text-secondary">Termos de Uso</a> e a <a href="#" class="font-bold underline text-secondary">Política de Privacidade</a>.
          </label>
        </div>

        <button type="submit" class="w-full editorial-gradient text-white font-headline font-bold py-4 rounded-xl shadow-lg hover:opacity-90 transition-all active:scale-[0.98] mt-4">
          Criar minha conta agora
        </button>
      </form>
    </div>
  </main>

  <footer class="p-6 text-center text-[10px] text-on-surface-variant/60 font-bold uppercase tracking-widest">
    <p>© 2024 SIGPREV Editorial Ledger. Todos os direitos reservados.</p>
  </footer>

  <script src="../sigprev-navigation.js"></script>
</body>
</html>
